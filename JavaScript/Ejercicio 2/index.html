<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Número divisible</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Comprobar si un número es divisible por 2</h2>

    <form>
        <label>Introduce un número (1-30):</label>
        <input type="number" id="numero"><br><br>

        <button type="button" onclick="comprobarNumero()">Comprobar</button>
    </form>

    <div id="resultado"></div>

    <script src="script.js"></script>
</body>
</html>
