<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Andalucía</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h2>Datos personales</h2>

    <form id="miFormulario">
        <label>Nombre:</label>
        <input type="text" id="nombre" required><br><br>

        <label>Provincia:</label>
        <select id="provincia">
            <option value="">--Selecciona--</option>
            <option value="almeriense">Almería</option>
            <option value="gaditano">Cádiz</option>
            <option value="cordobés">Córdoba</option>
            <option value="granadino">Granada</option>
            <option value="onubense">Huelva</option>
            <option value="jienense">Jaén</option>
            <option value="malagueño">Málaga</option>
            <option value="sevillano">Sevilla</option>
        </select><br><br>

        <label>Pueblo:</label>
        <input type="text" id="pueblo" required><br><br>

        <button type="button" onclick="mostrarResultado()">Enviar</button>
    </form>

    <p id="resultado"></p>

    <script src="script.js"></script>
</body>
</html>
